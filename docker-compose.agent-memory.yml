services:
  mnemic-memory-neo4j:
    image: neo4j:5.26-community
    container_name: mnemic-memory-neo4j
    profiles:
      - graph-store
    ports:
      - "${MNEMIC_NEO4J_HTTP_PORT:-7474}:7474"
      - "${MNEMIC_NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_AUTH:-neo4j/mnemic-memory-dev-password}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - mnemic_memory_neo4j_data:/data
      - mnemic_memory_neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "user=$${NEO4J_AUTH%%/*}; pass=$${NEO4J_AUTH#*/}; cypher-shell -u \"$${user:-neo4j}\" -p \"$${pass}\" 'RETURN 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  mnemic-memory-backend:
    build:
      context: .
      dockerfile: mnemic-server/Dockerfile.agent-memory
    container_name: mnemic-memory-backend
    ports:
      - "${MNEMIC_BACKEND_PORT:-8088}:8088"
    environment:
      NEO4J_URI: "${MNEMIC_BACKEND_NEO4J_URI:-bolt://mnemic-memory-neo4j:7687}"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-mnemic-memory-dev-password}"
      SERVER_PORT: "8088"
      MNEMIC_STORE: "${MNEMIC_STORE:-json}"
      MNEMIC_MEMORY_FILE: "/data/mnemic-memory.json"
      MNEMIC_SQLITE_FILE: "/data/mnemic-memory.sqlite"
    volumes:
      - mnemic_memory_data:/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8088/actuator/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

volumes:
  mnemic_memory_data:
  mnemic_memory_neo4j_data:
  mnemic_memory_neo4j_logs:
