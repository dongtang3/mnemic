  <text x="242" y="218" fill="#87939D" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22">MCP-native. Source-keyed. Temporal. Auditable. Reproducible.</text>

