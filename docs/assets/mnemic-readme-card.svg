<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mnemic local-first memory kernel for coding agents</title>
  <desc id="desc">A launch card showing Mnemic as an auditable temporal memory graph for MCP-compatible coding agents.</desc>
