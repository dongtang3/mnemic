name: Bug report
description: Report a reproducible Mnemic bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, config, fixture data, or MCP client steps.
      placeholder: |
        1. Run ...
        2. Call ...
        3. See ...
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - HTTP server
        - SDK
        - CLI
        - MCP server
        - Studio
        - Storage
        - Policy or audit
        - Docs
        - Other
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Paste relevant `npm run doctor` output. Redact private paths if needed.
      render: text
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs or test output.
      render: text
